  <title>Mis Gastos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0F1117;font-family:'DM Sans',sans-serif;color:#F1F5F9}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    .cat-pill{cursor:pointer;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:500;border:1.5px solid transparent;transition:all .2s;white-space:nowrap;background:none;display:flex;align-items:center;gap:4px}
    .exp-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;background:#1A1D27;margin-bottom:8px;transition:background .15s}
    .exp-row:hover{background:#1E2235}
    .ibtn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s;color:#64748B;display:flex;align-items:center}
    .ibtn:hover{background:#2D3249;color:#F1F5F9}
    .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#8B5CF6);border:none;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(99,102,241,.45);transition:transform .2s;z-index:100}
    .fab:hover{transform:scale(1.08)}
    .mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .modal{background:#161821;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
    .inp{background:#1A1D27;border:1.5px solid #2D3249;border-radius:12px;padding:12px 16px;color:#F1F5F9;font-size:15px;width:100%;font-family:inherit;outline:none;transition:border-color .2s}
    .inp:focus{border-color:#6366F1}
    .pbtn{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
    .lbtn{background:linear-gradient(135deg,#F59E0B,#F97316);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
    .sbtn{background:linear-gradient(135deg,#10B981,#059669);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
    .cbtn{background:#1A1D27;color:#94A3B8;border:1.5px solid #2D3249;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;width:100%;font-family:inherit}
    .tab{flex:1;padding:8px 3px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:500;border-radius:10px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:3px}
    .bar{height:6px;border-radius:999px;transition:width .5s ease}
    .mnav{background:none;border:none;color:#94A3B8;cursor:pointer;padding:8px;border-radius:8px;font-size:18px;transition:color .15s}
    .cc{background:#1A1D27;border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:3px solid}
    .cprog{height:5px;background:#2D3249;border-radius:999px;margin-top:8px;overflow:hidden}
    .cpbar{height:100%;border-radius:999px;transition:width .5s ease}
    .trow{display:flex;align-items:center;justify-content:space-between;background:#1A1D27;border:1.5px solid #2D3249;border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .2s}
    .trow.on{border-color:#10B981;background:#10B98111}
    .ttrack{width:44px;height:24px;border-radius:999px;background:#2D3249;transition:background .2s;position:relative;flex-shrink:0}
    .ttrack.on{background:#10B981}
    .tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
    .tthumb.on{transform:translateX(20px)}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}

const DEFAULT_CATS = [
  {id:"alimentacion",label:"Alimentación",icon:"Cart", c:"#F59E0B",custom:false},
  {id:"transporte",  label:"Transporte",  icon:"Car",  c:"#3B82F6",custom:false},
  {id:"servicios",   label:"Servicios",   icon:"Bolt", c:"#8B5CF6",custom:false},
  {id:"entretenimiento",label:"Entretenim.",icon:"Game",c:"#EC4899",custom:false},
  {id:"salud",       label:"Salud",       icon:"Heart",c:"#10B981",custom:false},
  {id:"ropa",        label:"Ropa",        icon:"Shirt",c:"#F97316",custom:false},
  {id:"coleccion",   label:"Colección",   icon:"Star", c:"#EF4444",custom:false},
  {id:"mascotas",    label:"Mascotas",    icon:"Paw",  c:"#06B6D4",custom:false},
  {id:"otros",       label:"Otros",       icon:"Box",  c:"#6B7280",custom:false},
];

const CAT_COLORS=["#F59E0B","#F97316","#EF4444","#EC4899","#8B5CF6","#6366F1","#3B82F6","#06B6D4","#10B981","#84CC16","#6B7280","#78716C"];
const CAT_ICONS=["Tag","Star","Heart","Bolt","Car","Cart","Shirt","Box","Paw","Game","TrendUp","User"];

const MES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const now=new Date();
const clp=n=>new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(n);
const cidx=(e,m,y)=>(y*12+m)-(e.startYear*12+e.startMonth);
const applies=(e,m,y)=>{const i=cidx(e,m,y);if(e.recurrente)return i>=0;if(e.cuotas===1)return i===0;return i>=0&&i<e.cuotas;};
const load=k=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):[]}catch{return[]}};
const loadObj=k=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):null}catch{return null}};

function CatIcon({icon,size=15}){
  const C=IC[icon]||IC.Tag;
  return <C/>;
}

function App(){
  const [tab,setTab]=useState("mes");
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const [cats,setCats]=useState(()=>loadObj("mg-cats")||DEFAULT_CATS);
  const [expenses,setExpenses]=useState(()=>load("mg-exp"));
  const [loans,setLoans]=useState(()=>load("mg-loans"));
  const [savings,setSavings]=useState(()=>load("mg-savings"));
  const [filterCat,setFilterCat]=useState("all");
  const [showExp,setShowExp]=useState(false);
  const [showLoan,setShowLoan]=useState(false);
  const [showSaving,setShowSaving]=useState(false);
  const [showCfg,setShowCfg]=useState(false);
  const [showCatMgr,setShowCatMgr]=useState(false);
  const [showNewCat,setShowNewCat]=useState(false);
  const [editExpId,setEditExpId]=useState(null);
  const [editLoanId,setEditLoanId]=useState(null);
  const [editSavingId,setEditSavingId]=useState(null);
  const [toast,setToast]=useState(null);
  const fileRef=useRef();
  const [ef,setEf]=useState({desc:"",amount:"",cat:"alimentacion",cuotas:"1",rec:false,byCuota:false});
  const [lf,setLf]=useState({persona:"",amount:"",cuotas:"1",byCuota:false,nota:""});
  const [sf,setSf]=useState({nombre:"",meta:"",aportado:"",nota:""});
  const [ncf,setNcf]=useState({label:"",icon:"Tag",c:"#6366F1"});

  useEffect(()=>{localStorage.setItem("mg-cats",JSON.stringify(cats));},[cats]);
  useEffect(()=>{localStorage.setItem("mg-exp",JSON.stringify(expenses));},[expenses]);
  useEffect(()=>{localStorage.setItem("mg-loans",JSON.stringify(loans));},[loans]);
  useEffect(()=>{localStorage.setItem("mg-savings",JSON.stringify(savings));},[savings]);

  const showMsg=(msg,color="#10B981")=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  const filtered=useMemo(()=>expenses.filter(e=>applies(e,month,year)&&(filterCat==="all"||e.cat===filterCat)),[expenses,month,year,filterCat]);
  const monthTotal=useMemo(()=>expenses.filter(e=>applies(e,month,year)).reduce((s,e)=>s+e.apc,0),[expenses,month,year]);
  const byCat=useMemo(()=>{const m={};expenses.filter(e=>applies(e,month,year)).forEach(e=>{m[e.cat]=(m[e.cat]||0)+e.apc;});return m;},[expenses,month,year]);
  const cuotasExp=useMemo(()=>expenses.filter(e=>e.cuotas>1&&!e.recurrente),[expenses]);
  const recs=useMemo(()=>expenses.filter(e=>e.recurrente),[expenses]);
  const pendingLoans=loans.filter(l=>l.cuotasPagadas<l.cuotas).length;
  const topCat=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  const totalAhorros=savings.reduce((s,a)=>s+a.aportado,0);

  const amt=v=>parseFloat(String(v).replace(/\./g,"").replace(",",".")||"0")||0;

  function saveExp(){
    const a=amt(ef.amount);const cuotas=Math.max(1,parseInt(ef.cuotas)||1);
    if(!ef.desc.trim()||a<=0)return;
    let apc,total;
    if(ef.rec){apc=a;total=a;}
    else if(ef.byCuota){apc=a;total=Math.round(a*cuotas);}
    else{total=a;apc=Math.round(a/cuotas);}
    const base={desc:ef.desc,total,apc,cat:ef.cat,cuotas,recurrente:ef.rec,startMonth:month,startYear:year,date:new Date().toLocaleDateString("es-CL")};
    if(editExpId!==null){setExpenses(p=>p.map(e=>e.id===editExpId?{...e,...base}:e));setEditExpId(null);}
    else setExpenses(p=>[...p,{id:Date.now(),...base}]);
    setEf({desc:"",amount:"",cat:"alimentacion",cuotas:"1",rec:false,byCuota:false});
    setShowExp(false);
  }
  function editExp(exp){setEf({desc:exp.desc,amount:String(exp.total),cat:exp.cat,cuotas:String(exp.cuotas),rec:exp.recurrente,byCuota:false});setEditExpId(exp.id);setShowExp(true);}
  function delExp(id){setExpenses(p=>p.filter(e=>e.id!==id));}

  function saveLoan(){
    const a=amt(lf.amount);const cuotas=Math.max(1,parseInt(lf.cuotas)||1);
    if(!lf.persona.trim()||a<=0)return;
    const apc=lf.byCuota?a:Math.round(a/cuotas);
    const total=lf.byCuota?Math.round(a*cuotas):a;
    const base={persona:lf.persona,total,apc,cuotas,nota:lf.nota,date:new Date().toLocaleDateString("es-CL"),cuotasPagadas:0};
    if(editLoanId!==null){setLoans(p=>p.map(l=>l.id===editLoanId?{...l,...base}:l));setEditLoanId(null);}
    else setLoans(p=>[...p,{id:Date.now(),...base}]);
    setLf({persona:"",amount:"",cuotas:"1",byCuota:false,nota:""});
    setShowLoan(false);
  }
  function editLoan(l){setLf({persona:l.persona,amount:String(l.total),cuotas:String(l.cuotas),byCuota:false,nota:l.nota||""});setEditLoanId(l.id);setShowLoan(true);}
  function delLoan(id){setLoans(p=>p.filter(l=>l.id!==id));}
  function pagarCuota(id){setLoans(p=>p.map(l=>l.id===id?{...l,cuotasPagadas:Math.min(l.cuotasPagadas+1,l.cuotas)}:l));}
  function deshacerPago(id){setLoans(p=>p.map(l=>l.id===id?{...l,cuotasPagadas:Math.max(l.cuotasPagadas-1,0)}:l));}

  function saveSaving(){
    const aportado=amt(sf.aportado);const meta=amt(sf.meta);
    if(!sf.nombre.trim()||aportado<0)return;
    const base={nombre:sf.nombre,meta,aportado,nota:sf.nota,date:new Date().toLocaleDateString("es-CL")};
    if(editSavingId!==null){setSavings(p=>p.map(s=>s.id===editSavingId?{...s,...base}:s));setEditSavingId(null);}
    else setSavings(p=>[...p,{id:Date.now(),...base}]);
    setSf({nombre:"",meta:"",aportado:"",nota:""});
    setShowSaving(false);
  }
  function editSaving(s){setSf({nombre:s.nombre,meta:String(s.meta),aportado:String(s.aportado),nota:s.nota||""});setEditSavingId(s.id);setShowSaving(true);}
  function delSaving(id){setSavings(p=>p.filter(s=>s.id!==id));}
  function aportar(id,extra){setSavings(p=>p.map(s=>s.id===id?{...s,aportado:s.aportado+extra}:s));}

  function saveNewCat(){
    if(!ncf.label.trim())return;
    const id="cat_"+Date.now();
    setCats(p=>[...p.slice(0,-1),{id,label:ncf.label,icon:ncf.icon,c:ncf.c,custom:true},p[p.length-1]]);
    setNcf({label:"",icon:"Tag",c:"#6366F1"});
    setShowNewCat(false);
  }
  function delCat(id){
    setCats(p=>p.filter(c=>c.id!==id));
    setExpenses(p=>p.map(e=>e.cat===id?{...e,cat:"otros"}:e));
  }

  function exportar(){
    const blob=new Blob([JSON.stringify({v:2,date:new Date().toISOString(),expenses,loans,savings,cats},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`mis-gastos-${new Date().toLocaleDateString("es-CL").replace(/\//g,"-")}.json`;a.click();
    URL.revokeObjectURL(url);showMsg("Respaldo exportado");
  }
  function importar(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      if(d.expenses){setExpenses(d.expenses);if(d.loans)setLoans(d.loans);if(d.savings)setSavings(d.savings);if(d.cats)setCats(d.cats);showMsg("Datos restaurados");setShowCfg(false);}
      else showMsg("Archivo inválido","#EF4444");
    }catch{showMsg("Error al leer","#EF4444");}};
    r.readAsText(f);e.target.value="";
  }

  function prevMonth(){if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextMonth(){if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}

  const CuotasInput=({value,onChange})=>(
    <div className="stepper">
      <button className="sbtn2" onClick={()=>onChange(String(Math.max(1,parseInt(value||1)-1)))}>−</button>
      <input className="sinp" type="number" min="1" max="48" value={value} onChange={e=>onChange(e.target.value)} onBlur={e=>{const v=Math.min(48,Math.max(1,parseInt(e.target.value)||1));onChange(String(v));}}/>
      <button className="sbtn2" onClick={()=>onChange(String(Math.min(48,parseInt(value||1)+1)))}>+</button>
    </div>
  );

  const EmptyState=({icon,text,sub})=>(
    <div style={{textAlign:"center",padding:"48px 0"}}>
      <div style={{width:56,height:56,borderRadius:16,background:"#1E2235",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",color:"#334155"}}>
        {React.createElement(IC[icon]||IC.Box,{size:28})}
      </div>
      <div style={{fontSize:15,fontWeight:500,color:"#475569"}}>{text}</div>
      {sub&&<div style={{fontSize:13,color:"#334155",marginTop:4}}>{sub}</div>}
    </div>
  );

  return <div style={{minHeight:"100vh",background:"#0F1117",paddingBottom:88}}>

    {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"white",padding:"10px 20px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,.4)",whiteSpace:"nowrap"}}>{toast.msg}</div>}

    {/* HEADER */}
    <div style={{background:"linear-gradient(160deg,#161821 0%,#1A1040 100%)",padding:"28px 20px 20px",borderBottom:"1px solid #1E2235"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:600,color:"#6366F1",letterSpacing:2,textTransform:"uppercase"}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/><line x1="8" y1="15" x2="8.01" y2="15" strokeWidth="3"/><line x1="12" y1="15" x2="16" y2="15"/></svg>
            Mis Gastos
          </div>
          <button className="ibtn" style={{color:"#64748B"}} onClick={()=>setShowCfg(true)}><IC.Gear/></button>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button className="mnav" onClick={prevMonth}>‹</button>
          <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700}}>{MES[month]}</div><div style={{fontSize:13,color:"#64748B"}}>{year}</div></div>
          <button className="mnav" onClick={nextMonth}>›</button>
        </div>
        <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",borderRadius:18,padding:"18px 22px"}}>
          <div style={{fontSize:12,color:"#94A3B8",marginBottom:2}}>Total del mes</div>
          <div style={{fontSize:30,fontWeight:700,fontFamily:"'DM Mono',monospace",letterSpacing:-1}}>{clp(monthTotal)}</div>
          {topCat&&<div style={{marginTop:6,fontSize:12,color:"#64748B",display:"flex",alignItems:"center",gap:5}}>
            Mayor: {(()=>{const c=cats.find(x=>x.id===topCat[0]);return c?<span style={{color:c.c,display:"inline-flex",alignItems:"center",gap:4,marginLeft:2}}><CatIcon icon={c.icon}/>{c.label}</span>:null;})()}&nbsp;— {clp(topCat[1])}
          </div>}
        </div>
      </div>
    </div>

    <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 0"}}>
      {/* TABS */}
      <div style={{display:"flex",background:"#161821",borderRadius:12,padding:4,marginBottom:16,border:"1px solid #1E2235"}}>
        {[["mes","Cal","Mes"],["cuotas","CC","Cuotas"],["fijos","Rep","Fijos"],["prestamos","Hand","Préstamos"],["ahorros","Pig","Ahorros"]].map(([id,icon,label])=>(
          <button key={id} className="tab" onClick={()=>setTab(id)} style={{color:tab===id?"#F1F5F9":"#64748B",background:tab===id?"#2D3249":"none"}}>
            {React.createElement(IC[icon])}
            {label}
            {id==="cuotas"&&cuotasExp.length>0&&<span style={{background:"#6366F1",color:"white",borderRadius:999,padding:"0 4px",fontSize:9}}>{cuotasExp.length}</span>}
            {id==="prestamos"&&pendingLoans>0&&<span style={{background:"#F59E0B",color:"white",borderRadius:999,padding:"0 4px",fontSize:9}}>{pendingLoans}</span>}
            {id==="ahorros"&&savings.length>0&&<span style={{background:"#10B981",color:"white",borderRadius:999,padding:"0 4px",fontSize:9}}>{savings.length}</span>}
          </button>
        ))}
      </div>

      {/* TAB MES */}
      {tab==="mes"&&<>
        {monthTotal>0&&<div style={{background:"#161821",border:"1px solid #1E2235",borderRadius:16,padding:16,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:"#64748B",letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Por categoría</div>
          {cats.filter(c=>byCat[c.id]).sort((a,b)=>(byCat[b.id]||0)-(byCat[a.id]||0)).map(cat=>(
            <div key={cat.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,marginBottom:4}}>
                <span style={{display:"flex",alignItems:"center",gap:6,color:cat.c}}><CatIcon icon={cat.icon}/>{cat.label}</span>
                <span style={{fontFamily:"'DM Mono',monospace",color:cat.c,fontSize:12}}>{clp(byCat[cat.id])}</span>
              </div>
              <div style={{background:"#1A1D27",borderRadius:999,height:6}}><div className="bar" style={{width:`${(byCat[cat.id]/monthTotal)*100}%`,background:cat.c}}/></div>
            </div>
          ))}
        </div>}
        <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:14,scrollbarWidth:"none"}}>
          <button className="cat-pill" onClick={()=>setFilterCat("all")} style={{background:filterCat==="all"?"#6366F1":"#1A1D27",color:filterCat==="all"?"white":"#94A3B8",border:`1.5px solid ${filterCat==="all"?"#6366F1":"#2D3249"}`}}>Todos</button>
          {cats.filter(c=>byCat[c.id]).map(cat=>(
            <button key={cat.id} className="cat-pill" onClick={()=>setFilterCat(filterCat===cat.id?"all":cat.id)} style={{background:filterCat===cat.id?cat.c+"22":"#1A1D27",color:filterCat===cat.id?cat.c:"#94A3B8",border:`1.5px solid ${filterCat===cat.id?cat.c:"#2D3249"}`}}><CatIcon icon={cat.icon}/>{cat.label}</button>
          ))}
        </div>
        {filtered.length===0
          ?<EmptyState icon="Cal" text="Sin gastos este mes" sub="Toca + para agregar uno"/>
          :filtered.sort((a,b)=>{const o=e=>e.recurrente?0:e.cuotas>1?1:2;return o(a)-o(b)||b.id-a.id;}).map(exp=>{
            const cat=cats.find(c=>c.id===exp.cat)||cats[cats.length-1];
            const ci=cidx(exp,month,year)+1;
            return <div key={exp.id} className="exp-row" style={{borderLeft:exp.recurrente?"3px solid #10B981":exp.cuotas>1?"3px solid #6366F1":"3px solid transparent"}}>
              <div style={{width:38,height:38,borderRadius:11,background:cat.c+"22",display:"flex",alignItems:"center",justifyContent:"center",color:cat.c,flexShrink:0}}><CatIcon icon={cat.icon}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:"#E2E8F0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{exp.desc}</div>
                <div style={{fontSize:11,color:"#475569",marginTop:3,display:"flex",alignItems:"center",gap:5}}>
                  <span>{cat.label}</span>
                  {exp.recurrente&&<span className="badge" style={{background:"#10B98122",color:"#10B981"}}>Fijo</span>}
                  {!exp.recurrente&&exp.cuotas>1&&<span className="badge" style={{background:"#6366F122",color:"#818CF8"}}>{ci}/{exp.cuotas}</span>}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:500,color:cat.c}}>{clp(exp.apc)}</div>
                {exp.cuotas>1&&<div style={{fontSize:10,color:"#475569"}}>de {clp(exp.total)}</div>}
              </div>
              <button className="ibtn" onClick={()=>editExp(exp)}><IC.Edit/></button>
              <button className="ibtn" onClick={()=>delExp(exp.id)}><IC.Trash/></button>
            </div>;
          })
        }
      </>}

      {/* TAB CUOTAS */}
      {tab==="cuotas"&&<>
        {cuotasExp.length===0
          ?<EmptyState icon="CC" text="Sin gastos en cuotas" sub="Agrega un gasto con más de 1 cuota"/>
          :cuotasExp.sort((a,b)=>(a.startYear*12+a.startMonth+a.cuotas)-(b.startYear*12+b.startMonth+b.cuotas)).map(exp=>{
            const cat=cats.find(c=>c.id===exp.cat)||cats[cats.length-1];
            const ci=cidx(exp,month,year);
            const pag=Math.min(Math.max(ci+1,0),exp.cuotas);
            const em=(exp.startMonth+exp.cuotas-1)%12;
            const ey=exp.startYear+Math.floor((exp.startMonth+exp.cuotas-1)/12);
            const done=ci>=exp.cuotas;
            return <div key={exp.id} className="cc" style={{borderLeftColor:cat.c,opacity:done?.5:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{color:cat.c}}><CatIcon icon={cat.icon}/></div>
                    <span style={{fontSize:14,fontWeight:600,color:"#E2E8F0"}}>{exp.desc}</span>
                    {done&&<span className="badge" style={{background:"#10B98122",color:"#10B981"}}>PAGADO</span>}
                  </div>
                  <div style={{fontSize:12,color:"#64748B"}}>{MES[exp.startMonth]} {exp.startYear} → {MES[em]} {ey}</div>
                </div>
                <div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:cat.c}}>{clp(exp.apc)}<span style={{fontSize:11,color:"#64748B",fontWeight:400}}>/mes</span></div><div style={{fontSize:11,color:"#64748B"}}>Total {clp(exp.total)}</div></div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748B",marginTop:8,marginBottom:4}}><span>{done?"Completado":`Cuota ${Math.min(ci+1,exp.cuotas)} de ${exp.cuotas}`}</span><span style={{color:cat.c,fontWeight:600}}>{Math.round((pag/exp.cuotas)*100)}%</span></div>
              <div className="cprog"><div className="cpbar" style={{width:`${(pag/exp.cuotas)*100}%`,background:cat.c}}/></div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button className="ibtn" style={{fontSize:12,padding:"4px 10px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>editExp(exp)}><IC.Edit/>Editar</button>
                <button className="ibtn" style={{fontSize:12,padding:"4px 10px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>delExp(exp.id)}><IC.Trash/>Eliminar</button>
              </div>
            </div>;
          })
        }
      </>}

      {/* TAB FIJOS */}
      {tab==="fijos"&&<>
        {recs.length===0
          ?<EmptyState icon="Rep" text="Sin gastos fijos" sub="Agrega arriendo, Netflix, etc."/>
          :<>
            <div style={{background:"#10B98111",border:"1px solid #10B98133",borderRadius:14,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#10B981"}}><strong>Total fijos:</strong> {clp(recs.reduce((s,e)=>s+e.apc,0))} / mes</div>
            {recs.map(exp=>{
              const cat=cats.find(c=>c.id===exp.cat)||cats[cats.length-1];
              return <div key={exp.id} style={{background:"#1A1D27",borderRadius:14,padding:"14px 16px",marginBottom:10,borderLeft:"3px solid #10B981"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:11,background:cat.c+"22",display:"flex",alignItems:"center",justifyContent:"center",color:cat.c}}><CatIcon icon={cat.icon}/></div>
                    <div><div style={{fontSize:14,fontWeight:600,color:"#E2E8F0"}}>{exp.desc}</div><div style={{fontSize:11,color:"#64748B",marginTop:2}}>{cat.label} · desde {MES[exp.startMonth]} {exp.startYear}</div></div>
                  </div>
                  <div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#10B981"}}>{clp(exp.apc)}</div><div style={{fontSize:10,color:"#475569"}}>/mes</div></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button className="ibtn" style={{fontSize:12,padding:"4px 10px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>editExp(exp)}><IC.Edit/>Editar</button>
                  <button className="ibtn" style={{fontSize:12,padding:"4px 10px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>delExp(exp.id)}><IC.Trash/>Eliminar</button>
                </div>
              </div>;
            })}
          </>
        }
      </>}

      {/* TAB PRÉSTAMOS */}
      {tab==="prestamos"&&<>
        {loans.length===0
          ?<EmptyState icon="User" text="Sin préstamos registrados" sub="Toca + para agregar uno"/>
          :<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div style={{background:"#1A1D27",borderRadius:14,padding:"14px 16px",borderLeft:"3px solid #F59E0B"}}>
                <div style={{fontSize:11,color:"#64748B",marginBottom:4}}>Total prestado</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#F59E0B"}}>{clp(loans.reduce((s,l)=>s+l.total,0))}</div>
              </div>
              <div style={{background:"#1A1D27",borderRadius:14,padding:"14px 16px",borderLeft:"3px solid #EF4444"}}>
                <div style={{fontSize:11,color:"#64748B",marginBottom:4}}>Por cobrar</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#EF4444"}}>{clp(loans.reduce((s,l)=>s+l.apc*(l.cuotas-l.cuotasPagadas),0))}</div>
              </div>
            </div>
            {loans.sort((a,b)=>(a.cuotasPagadas>=a.cuotas?1:-1)).map(loan=>{
              const paid=loan.cuotasPagadas>=loan.cuotas;
              return <div key={loan.id} className="cc" style={{borderLeftColor:paid?"#10B981":"#F59E0B",opacity:paid?.65:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <div style={{width:38,height:38,borderRadius:11,background:paid?"#10B98122":"#F59E0B22",display:"flex",alignItems:"center",justifyContent:"center",color:paid?"#10B981":"#F59E0B",flexShrink:0}}><IC.User/></div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:14,fontWeight:600,color:"#E2E8F0"}}>{loan.persona}</span>
                        {paid&&<span className="badge" style={{background:"#10B98122",color:"#10B981"}}>PAGADO</span>}
                      </div>
                      <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{loan.date}{loan.nota&&<span style={{marginLeft:6}}>· {loan.nota}</span>}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:paid?"#10B981":"#F59E0B"}}>{clp(loan.total)}</div>
                    {loan.cuotas>1&&<div style={{fontSize:11,color:"#64748B"}}>{clp(loan.apc)}/cuota</div>}
                  </div>
                </div>
                {loan.cuotas>1&&<>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748B",marginBottom:4}}>
                    <span>{paid?"Completado":`${loan.cuotasPagadas}/${loan.cuotas} · Falta ${clp(loan.apc*(loan.cuotas-loan.cuotasPagadas))}`}</span>
                    <span style={{color:paid?"#10B981":"#F59E0B",fontWeight:600}}>{Math.round((loan.cuotasPagadas/loan.cuotas)*100)}%</span>
                  </div>
                  <div style={{height:5,background:"#2D3249",borderRadius:999,marginBottom:10,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:999,background:paid?"#10B981":"#F59E0B",width:`${(loan.cuotasPagadas/loan.cuotas)*100}%`,transition:"width .4s"}}/>
                  </div>
                </>}
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  {!paid&&<button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #10B98144",borderRadius:8,gap:4,color:"#10B981"}} onClick={()=>pagarCuota(loan.id)}><IC.Check/>{loan.cuotas>1?"Registrar cuota":"Marcar pagado"}</button>}
                  {loan.cuotasPagadas>0&&<button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>deshacerPago(loan.id)}>↩ Deshacer</button>}
                  <button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>editLoan(loan)}><IC.Edit/>Editar</button>
                  <button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>delLoan(loan.id)}><IC.Trash/>Eliminar</button>
                </div>
              </div>;
            })}
          </>
        }
      </>}

      {/* TAB AHORROS */}
      {tab==="ahorros"&&<>
        {savings.length===0
          ?<EmptyState icon="Pig" text="Sin ahorros registrados" sub="Toca + para crear una meta"/>
          :<>
            <div style={{background:"#10B98111",border:"1px solid #10B98133",borderRadius:14,padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:"#10B981"}}><strong>Total ahorrado:</strong> {clp(totalAhorros)}</div>
              {savings.some(s=>s.meta>0)&&<div style={{fontSize:12,color:"#64748B"}}>Meta total: {clp(savings.filter(s=>s.meta>0).reduce((s,a)=>s+a.meta,0))}</div>}
            </div>
            {savings.map(ahorro=>{
              const pct=ahorro.meta>0?Math.min(100,Math.round((ahorro.aportado/ahorro.meta)*100)):null;
              const done=ahorro.meta>0&&ahorro.aportado>=ahorro.meta;
              return <div key={ahorro.id} style={{background:"#1A1D27",borderRadius:14,padding:"14px 16px",marginBottom:10,borderLeft:`3px solid ${done?"#F59E0B":"#10B981"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <span style={{fontSize:14,fontWeight:600,color:"#E2E8F0"}}>{ahorro.nombre}</span>
                      {done&&<span className="badge" style={{background:"#F59E0B22",color:"#F59E0B"}}>META</span>}
                    </div>
                    <div style={{fontSize:11,color:"#64748B"}}>{ahorro.date}{ahorro.nota&&<span style={{marginLeft:6}}>· {ahorro.nota}</span>}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:done?"#F59E0B":"#10B981"}}>{clp(ahorro.aportado)}</div>
                    {ahorro.meta>0&&<div style={{fontSize:11,color:"#64748B"}}>meta {clp(ahorro.meta)}</div>}
                  </div>
                </div>
                {ahorro.meta>0&&<>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748B",marginBottom:4}}>
                    <span>{done?"Meta alcanzada":`Faltan ${clp(ahorro.meta-ahorro.aportado)}`}</span>
                    <span style={{color:done?"#F59E0B":"#10B981",fontWeight:600}}>{pct}%</span>
                  </div>
                  <div style={{height:5,background:"#2D3249",borderRadius:999,marginBottom:10,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:999,background:done?"#F59E0B":"#10B981",width:`${pct}%`,transition:"width .4s"}}/>
                  </div>
                </>}
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  <button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #10B98144",borderRadius:8,gap:4,color:"#10B981"}} onClick={()=>editSaving(ahorro)}><IC.TrendUp/>Actualizar</button>
                  <button className="ibtn" style={{fontSize:12,padding:"5px 11px",border:"1px solid #2D3249",borderRadius:8,gap:4}} onClick={()=>delSaving(ahorro.id)}><IC.Trash/>Eliminar</button>
                </div>
              </div>;
            })}
          </>
        }
      </>}
    </div>

    {/* FAB */}
    <button className="fab" onClick={()=>{
      if(tab==="prestamos"){setShowLoan(true);setEditLoanId(null);setLf({persona:"",amount:"",cuotas:"1",byCuota:false,nota:""});}
      else if(tab==="ahorros"){setShowSaving(true);setEditSavingId(null);setSf({nombre:"",meta:"",aportado:"",nota:""});}
      else{setShowExp(true);setEditExpId(null);setEf({desc:"",amount:"",cat:"alimentacion",cuotas:"1",rec:false,byCuota:false});}
    }}><IC.Plus/></button>

    {/* MODAL CONFIG */}
    {showCfg&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget)setShowCfg(false);}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:6,color:"#F1F5F9",display:"flex",alignItems:"center",gap:8}}><IC.Gear/>Configuración</div>
        <div style={{fontSize:13,color:"#64748B",marginBottom:16}}>Respaldo y categorías</div>
        <button className="bkbtn" onClick={()=>{setShowCfg(false);setShowCatMgr(true);}} style={{borderColor:"#6366F133"}}>
          <IC.Tag/><div><div style={{color:"#F1F5F9",fontWeight:600}}>Gestionar categorías</div><div style={{fontSize:11,marginTop:1}}>Agrega o elimina categorías</div></div>
        </button>
        <button className="bkbtn" onClick={exportar}><IC.Down/><div><div style={{color:"#F1F5F9",fontWeight:600}}>Exportar respaldo</div><div style={{fontSize:11,marginTop:1}}>Descarga un .json con tus datos</div></div></button>
        <button className="bkbtn" onClick={()=>fileRef.current.click()}><IC.Up/><div><div style={{color:"#F1F5F9",fontWeight:600}}>Importar respaldo</div><div style={{fontSize:11,marginTop:1}}>Restaura desde un .json</div></div></button>
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importar}/>
        <button className="cbtn" style={{marginTop:8}} onClick={()=>setShowCfg(false)}>Cerrar</button>
      </div>
    </div>}

    {/* MODAL CATEGORÍAS */}
    {showCatMgr&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget)setShowCatMgr(false);}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:16,color:"#F1F5F9",display:"flex",alignItems:"center",gap:8}}><IC.Tag/>Categorías</div>
        {cats.map(cat=>(
          <div key={cat.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#1A1D27",borderRadius:12,marginBottom:8}}>
            <div style={{width:34,height:34,borderRadius:10,background:cat.c+"22",display:"flex",alignItems:"center",justifyContent:"center",color:cat.c,flexShrink:0}}><CatIcon icon={cat.icon}/></div>
            <div style={{flex:1,fontSize:14,fontWeight:500,color:"#E2E8F0"}}>{cat.label}</div>
            {cat.custom&&<button className="ibtn" onClick={()=>delCat(cat.id)}><IC.Trash/></button>}
            {!cat.custom&&<span style={{fontSize:10,color:"#334155",padding:"2px 8px",background:"#1E2235",borderRadius:999}}>predeterminada</span>}
          </div>
        ))}
        <button style={{width:"100%",padding:"12px",border:"1.5px dashed #2D3249",borderRadius:12,background:"none",color:"#6366F1",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:500,marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:6}} onClick={()=>{setShowCatMgr(false);setShowNewCat(true);}}>
          <IC.Plus/>Nueva categoría
        </button>
        <button className="cbtn" style={{marginTop:10}} onClick={()=>setShowCatMgr(false)}>Listo</button>
      </div>
    </div>}

    {/* MODAL NUEVA CATEGORÍA */}
    {showNewCat&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget){setShowNewCat(false);setShowCatMgr(true);}}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:20,color:"#F1F5F9"}}>Nueva categoría</div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Nombre</label>
          <input className="inp" placeholder="Ej: Educación, Viajes…" value={ncf.label} onChange={e=>setNcf(f=>({...f,label:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:8,fontWeight:500}}>Color</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {CAT_COLORS.map(c=><div key={c} className={`color-swatch${ncf.c===c?" sel":""}`} style={{background:c}} onClick={()=>setNcf(f=>({...f,c}))}/>)}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:8,fontWeight:500}}>Ícono</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {CAT_ICONS.map(icon=>(
              <button key={icon} onClick={()=>setNcf(f=>({...f,icon}))} style={{width:40,height:40,borderRadius:10,border:`1.5px solid ${ncf.icon===icon?ncf.c:"#2D3249"}`,background:ncf.icon===icon?ncf.c+"22":"#1A1D27",color:ncf.icon===icon?ncf.c:"#64748B",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {React.createElement(IC[icon])}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16,padding:"12px 14px",background:"#1A1D27",borderRadius:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:11,background:ncf.c+"22",display:"flex",alignItems:"center",justifyContent:"center",color:ncf.c}}>{React.createElement(IC[ncf.icon])}</div>
          <span style={{fontSize:14,fontWeight:500,color:"#E2E8F0"}}>{ncf.label||"Vista previa"}</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="cbtn" onClick={()=>{setShowNewCat(false);setShowCatMgr(true);}}>Cancelar</button>
          <button className="pbtn" onClick={saveNewCat}>Crear</button>
        </div>
      </div>
    </div>}

    {/* MODAL GASTO */}
    {showExp&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget){setShowExp(false);setEditExpId(null);}}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:20,color:"#F1F5F9"}}>{editExpId?"Editar gasto":"Nuevo gasto"}</div>
        <div style={{marginBottom:18}}>
          <div className={`trow${ef.rec?" on":""}`} onClick={()=>setEf(f=>({...f,rec:!f.rec,cuotas:"1"}))}>
            <div><div style={{fontSize:14,fontWeight:600,color:ef.rec?"#10B981":"#E2E8F0",display:"flex",alignItems:"center",gap:6}}><IC.Rep/>Gasto fijo mensual</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>Arriendo, Netflix, suscripciones…</div></div>
            <div className={`ttrack${ef.rec?" on":""}`}><div className={`tthumb${ef.rec?" on":""}`}/></div>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Descripción</label>
          <input className="inp" placeholder="Ej: Arriendo, TV Samsung…" value={ef.desc} onChange={e=>setEf(f=>({...f,desc:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          {!ef.rec&&<div className="mtoggle">
            <button className="mbtn" onClick={()=>setEf(f=>({...f,byCuota:false,amount:""}))} style={{background:!ef.byCuota?"#6366F1":"none",color:!ef.byCuota?"white":"#64748B"}}>Monto total</button>
            <button className="mbtn" onClick={()=>setEf(f=>({...f,byCuota:true,amount:""}))} style={{background:ef.byCuota?"#6366F1":"none",color:ef.byCuota?"white":"#64748B"}}>Por cuota</button>
          </div>}
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>
            {ef.rec?"Monto mensual":ef.byCuota?"Monto por cuota":"Monto total"} (CLP)
            {!ef.rec&&!ef.byCuota&&parseInt(ef.cuotas)>1&&<span style={{color:"#6366F1",marginLeft:8}}>→ {clp(Math.round(amt(ef.amount)/parseInt(ef.cuotas)))}/mes</span>}
            {!ef.rec&&ef.byCuota&&parseInt(ef.cuotas)>1&&<span style={{color:"#6366F1",marginLeft:8}}>Total: {clp(Math.round(amt(ef.amount)*parseInt(ef.cuotas)))}</span>}
          </label>
          <input className="inp" placeholder="0" type="number" value={ef.amount} onChange={e=>setEf(f=>({...f,amount:e.target.value}))}/>
        </div>
        {!ef.rec&&<div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Cuotas {parseInt(ef.cuotas)===1?"(pago único)":`(${ef.cuotas} meses)`}</label>
          <CuotasInput value={ef.cuotas} onChange={v=>setEf(f=>({...f,cuotas:v}))}/>
        </div>}
        {ef.rec&&<div style={{fontSize:12,color:"#10B981",background:"#10B98111",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><IC.Check/><span>Aparecerá desde <strong>{MES[month]} {year}</strong> en adelante.</span></div>}
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:8,fontWeight:500}}>Categoría</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {cats.map(cat=>(
              <button key={cat.id} onClick={()=>setEf(f=>({...f,cat:cat.id}))} style={{padding:"7px 11px",borderRadius:10,border:`1.5px solid ${ef.cat===cat.id?cat.c:"#2D3249"}`,background:ef.cat===cat.id?cat.c+"22":"#1A1D27",color:ef.cat===cat.id?cat.c:"#94A3B8",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:ef.cat===cat.id?600:400,display:"flex",alignItems:"center",gap:5}}>
                <CatIcon icon={cat.icon}/>{cat.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="cbtn" onClick={()=>{setShowExp(false);setEditExpId(null);}}>Cancelar</button>
          <button className="pbtn" onClick={saveExp}>{editExpId?"Guardar":"Agregar"}</button>
        </div>
      </div>
    </div>}

    {/* MODAL PRÉSTAMO */}
    {showLoan&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget){setShowLoan(false);setEditLoanId(null);}}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:20,color:"#F1F5F9",display:"flex",alignItems:"center",gap:8}}><IC.User/>{editLoanId?"Editar préstamo":"Nuevo préstamo"}</div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>¿A quién le prestaste?</label>
          <input className="inp" placeholder="Nombre de la persona" value={lf.persona} onChange={e=>setLf(f=>({...f,persona:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <div className="mtoggle">
            <button className="mbtn" onClick={()=>setLf(f=>({...f,byCuota:false,amount:""}))} style={{background:!lf.byCuota?"#F59E0B":"none",color:!lf.byCuota?"white":"#64748B"}}>Monto total</button>
            <button className="mbtn" onClick={()=>setLf(f=>({...f,byCuota:true,amount:""}))} style={{background:lf.byCuota?"#F59E0B":"none",color:lf.byCuota?"white":"#64748B"}}>Por cuota</button>
          </div>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>
            {lf.byCuota?"Monto por cuota":"Monto total"} (CLP)
            {!lf.byCuota&&parseInt(lf.cuotas)>1&&<span style={{color:"#F59E0B",marginLeft:8}}>→ {clp(Math.round(amt(lf.amount)/parseInt(lf.cuotas)))}/cuota</span>}
            {lf.byCuota&&parseInt(lf.cuotas)>1&&<span style={{color:"#F59E0B",marginLeft:8}}>Total: {clp(Math.round(amt(lf.amount)*parseInt(lf.cuotas)))}</span>}
          </label>
          <input className="inp" placeholder="0" type="number" value={lf.amount} onChange={e=>setLf(f=>({...f,amount:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Cuotas {parseInt(lf.cuotas)===1?"(pago único)":`(${lf.cuotas} pagos)`}</label>
          <CuotasInput value={lf.cuotas} onChange={v=>setLf(f=>({...f,cuotas:v}))}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Nota (opcional)</label>
          <input className="inp" placeholder="Ej: Para la micro…" value={lf.nota} onChange={e=>setLf(f=>({...f,nota:e.target.value}))}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="cbtn" onClick={()=>{setShowLoan(false);setEditLoanId(null);}}>Cancelar</button>
          <button className="lbtn" onClick={saveLoan}>{editLoanId?"Guardar":"Agregar"}</button>
        </div>
      </div>
    </div>}

    {/* MODAL AHORRO */}
    {showSaving&&<div className="mbg" onClick={e=>{if(e.target===e.currentTarget){setShowSaving(false);setEditSavingId(null);}}}>
      <div className="modal">
        <div style={{fontSize:17,fontWeight:700,marginBottom:20,color:"#F1F5F9",display:"flex",alignItems:"center",gap:8}}><IC.Pig/>{editSavingId?"Actualizar ahorro":"Nuevo ahorro"}</div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Nombre</label>
          <input className="inp" placeholder="Ej: Vacaciones, Auto, Fondo emergencia…" value={sf.nombre} onChange={e=>setSf(f=>({...f,nombre:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Monto ahorrado (CLP)</label>
          <input className="inp" placeholder="0" type="number" value={sf.aportado} onChange={e=>setSf(f=>({...f,aportado:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Meta (opcional)</label>
          <input className="inp" placeholder="0 — deja vacío si no tienes meta" type="number" value={sf.meta} onChange={e=>setSf(f=>({...f,meta:e.target.value}))}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Nota (opcional)</label>
          <input className="inp" placeholder="Ej: Para diciembre…" value={sf.nota} onChange={e=>setSf(f=>({...f,nota:e.target.value}))}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="cbtn" onClick={()=>{setShowSaving(false);setEditSavingId(null);}}>Cancelar</button>
          <button className="sbtn" onClick={saveSaving}>{editSavingId?"Guardar":"Crear"}</button>
        </div>
      </div>
    </div>}

  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
